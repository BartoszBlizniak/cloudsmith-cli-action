# action.yml — Cloudsmith CLI Setup (standalone binary, Cloudsmith-hosted installer)
#
# Installs the Cloudsmith CLI as a standalone binary. No Python, no pip, no zipapp.
# The action downloads a small installer script from a PUBLIC Cloudsmith repo and
# runs it; the script detects the runner host, resolves the matching tagged
# archive, downloads + extracts it, puts `cloudsmith` on PATH, and authenticates.
#
#   - Linux / macOS runners -> install.sh  (shell: bash)
#   - Windows runners        -> install.ps1 (shell: pwsh)
#
# Authentication is handled by the CLI itself on first use (e.g. `whoami`):
#   - CLOUDSMITH_API_KEY in the job env, OR
#   - native OIDC via CLOUDSMITH_ORG + CLOUDSMITH_SERVICE_SLUG (needs id-token: write).

name: "Cloudsmith CLI Setup"
description: "Install the Cloudsmith CLI standalone binary via the Cloudsmith-hosted installer (Linux, macOS, Windows). No Python required."
author: "Cloudsmith"

branding:
  icon: "box"
  color: "blue"

inputs:
  cli-version:
    description: "Cloudsmith CLI version to install, e.g. '1.19.0', or 'latest'."
    required: false
    default: "latest"
  install-repo:
    description: "Public Cloudsmith repo hosting the CLI binaries, as OWNER/REPOSITORY."
    required: false
    default: "bart-demo-org-terraform/cli-binary-release-test"
  installer-version:
    description: "Version of the installer script package to download from Cloudsmith."
    required: false
    default: "v0.0.2"
  installer-url:
    description: "Override: full URL to install.sh (Linux/macOS). Takes precedence over installer-version."
    required: false
    default: ""
  installer-url-ps1:
    description: "Override: full URL to install.ps1 (Windows). Takes precedence over installer-version."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Cloudsmith CLI (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -euo pipefail
        url="${{ inputs.installer-url }}"
        if [ -z "$url" ]; then
          url="https://dl.cloudsmith.io/public/${{ inputs.install-repo }}/raw/versions/${{ inputs.installer-version }}/install.sh"
        fi
        echo "::group::Cloudsmith CLI install (${RUNNER_OS})"
        curl -fsSL --retry 3 "$url" \
          | sh -s -- --repo "${{ inputs.install-repo }}" --version "${{ inputs.cli-version }}"
        echo "::endgroup::"

    - name: Install Cloudsmith CLI (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $url = "${{ inputs.installer-url-ps1 }}"
        if ([string]::IsNullOrEmpty($url)) {
          $url = "https://dl.cloudsmith.io/public/${{ inputs.install-repo }}/raw/versions/${{ inputs.installer-version }}/install.ps1"
        }
        Write-Host "::group::Cloudsmith CLI install ($env:RUNNER_OS)"
        $script = Join-Path $env:RUNNER_TEMP "cloudsmith-install.ps1"
        Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile $script
        & $script -Repo "${{ inputs.install-repo }}" -Version "${{ inputs.cli-version }}"
        Write-Host "::endgroup::"
