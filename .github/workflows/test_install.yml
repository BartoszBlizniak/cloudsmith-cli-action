name: "🚀 Test Cloudsmith CLI Installer"
on:
  workflow_dispatch:
  push:
permissions:
  id-token: write
  contents: read
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest # 🐧
          - macos-latest # 🍏
          - windows-latest # 🪟
    env:
      # Native OIDC: the CLI exchanges the GitHub OIDC token for a short-lived
      # Cloudsmith credential on first use. No API key needed.
      CLOUDSMITH_ORG: ${{ vars.CLOUDSMITH_ORG }}
      CLOUDSMITH_SERVICE_SLUG: ${{ vars.CLOUDSMITH_SERVICE_SLUG }}
    steps:
      - uses: actions/checkout@v4

      - name: "📦 Install Cloudsmith CLI"
        uses: ./
        with:
          cli-version: "latest"

      - name: "🔍 Verify Cloudsmith CLI (Linux/macOS)"
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cloudsmith --version
          out="$(cloudsmith whoami)"
          echo "$out"
          # whoami exits 0 even when anonymous; assert real authentication.
          echo "$out" | grep -qi "anonymous" && { echo "::error::not authenticated (anonymous)"; exit 1; }
          echo "$out" | grep -q "${{ vars.CLOUDSMITH_SERVICE_SLUG }}"

      - name: "🔍 Verify Cloudsmith CLI (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cloudsmith --version
          $out = cloudsmith whoami | Out-String
          Write-Host $out
          if ($out -match "anonymous") { Write-Error "not authenticated (anonymous)"; exit 1 }
          if ($out -notmatch "${{ vars.CLOUDSMITH_SERVICE_SLUG }}") { Write-Error "unexpected identity"; exit 1 }
